<script>
// --- SHARED CART LOGIC ---
let cart = JSON.parse(localStorage.getItem('SODO_CART')) || [];

function toggleCart() {
    document.getElementById('cartSidebar').classList.toggle('active');
}

function updateCartUI() {
    const navCart = document.getElementById('cart-nav');
    if(navCart) navCart.innerText = `Cart(${cart.length})`;
    
    const list = document.getElementById('cartItemsList');
    if(!list) return;

    if (cart.length === 0) {
        list.innerHTML = '<p style="color: #999;">Cart is empty.</p>';
    } else {
        list.innerHTML = cart.map((item, index) => `
            <div class="cart-item">
                <img src="${item.image}" alt="">
                <div class="cart-item-info">
                    <h4>${item.name}</h4>
                    <strong>${item.price.toLocaleString()}₮</strong><br>
                    <button class="remove-btn" onclick="removeFromCart(${index})">Remove</button>
                </div>
            </div>
        `).join('');
    }
    
    const total = cart.reduce((sum, item) => sum + item.price, 0);
    const totalDiv = document.getElementById('cartTotal');
    if(totalDiv) totalDiv.innerText = `Total: ${total.toLocaleString()}₮`;
}

function removeFromCart(index) {
    cart.splice(index, 1);
    localStorage.setItem('SODO_CART', JSON.stringify(cart));
    updateCartUI();
}

// Initialize UI on load
document.addEventListener('DOMContentLoaded', updateCartUI);

</script>
